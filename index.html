<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dnešní přehled</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="mobile-device">
        <div class="mobile-notch"></div>
        
        <div class="mobile-screen">
            <div class="time-section">
                <h1 id="time">--:--</h1>
                <p id="seconds-wrapper"><span id="seconds">--</span></p>
            </div>
            
            <div class="divider"></div>
            
            <div class="date-section">
                <h2 id="day-of-week">Načítání...</h2>
                <h3 id="full-date">Načítání...</h3>
            </div>
            
            <div class="name-day-section">
                <div class="icon-text">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <p>Dnes má svátek:</p>
                </div>
                <h2 id="name-day" class="highlight">Načítání...</h2>
            </div>
            
            <div class="celebrity-section" style="margin-top: 1.5rem;">
                <div class="icon-text" style="color: var(--text-muted); font-size: 0.85rem;">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width: 14px; height: 14px;">
                        <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"></path>
                    </svg>
                    <p>Narozeniny slaví také:</p>
                </div>
                <div id="celebrities" class="celebrity-list">Načítání...</div>
            </div>
            
            <!-- Chat history area -->
            <div id="chat-messages" class="chat-container"></div>
        </div>
        
        <!-- SMS Input Bar -->
        <div class="message-input-wrapper">
            <input type="text" id="sms-input" placeholder="iMessage..." autocomplete="off">
            <button id="send-btn" class="send-btn" aria-label="Poslat">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
            </button>
        </div>
        
        <div class="mobile-home-bar"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
